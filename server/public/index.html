<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Direct Messages</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #060606;
      --panel: rgba(20, 20, 20, 0.92);
      --panel-2: rgba(14, 14, 14, 0.95);
      --muted: #9ea3ab;
      --text: #f2f2f2;
      --line: #2a2a2a;
      --accent: #8f949c;
      --accent-2: #626872;
      --shadow: 0 14px 36px rgba(0,0,0,0.28);
      --glass: rgba(255,255,255,0.03);
      font-family: 'Manrope', system-ui, sans-serif;
    }
    * { box-sizing: border-box; }
    body { margin: 0; background: radial-gradient(circle at 25% 20%, rgba(255,255,255,0.04), transparent 32%), radial-gradient(circle at 80% 0%, rgba(180,180,180,0.05), transparent 28%), var(--bg); color: var(--text); min-height: 100dvh; display: flex; align-items: center; justify-content: center; padding: 16px; position: relative; overflow: auto; }
    body::before, body::after { content: ''; position: absolute; inset: 0; pointer-events: none; }
    body::before { background: radial-gradient(circle at 18% 10%, rgba(255,255,255,0.08), transparent 32%), radial-gradient(circle at 82% 18%, rgba(180,180,180,0.08), transparent 28%); filter: blur(30px); }
    body::after { background-image: linear-gradient(120deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0) 20%, rgba(255,255,255,0.03) 40%, rgba(255,255,255,0) 60%); mix-blend-mode: screen; background-size: cover; background-position: center; opacity: 0.6; filter: blur(4px); }
    .app-shell { position: relative; width: min(1400px, calc(100vw - 20px)); height: min(95dvh, 980px); background: var(--panel); border: 1px solid var(--line); border-radius: 16px; box-shadow: var(--shadow); overflow: hidden; display: grid; grid-template-columns: minmax(240px, 24vw) minmax(560px, 1fr) minmax(220px, 20vw); min-height: 0; max-height: none; backdrop-filter: blur(10px); }
    .app-shell::before, .app-shell::after { content: ''; position: absolute; inset: 0; pointer-events: none; }
    .app-shell::before { background: radial-gradient(circle at 18% 30%, rgba(255,255,255,0.08), transparent 35%), radial-gradient(circle at 90% 70%, rgba(180,180,180,0.08), transparent 30%); opacity: 0.9; }
    .app-shell::after { background: linear-gradient(135deg, rgba(255,255,255,0.05), rgba(255,255,255,0)), repeating-linear-gradient(90deg, rgba(255,255,255,0.03) 0 1px, transparent 1px 40px); mix-blend-mode: screen; }
    @media (max-width: 1280px) { .app-shell { grid-template-columns: minmax(230px, 33vw) minmax(0, 1fr); height: calc(100dvh - 24px); } .aside-right { display:none; } }
    @media (max-width: 900px) { .app-shell { grid-template-columns: minmax(220px, 44vw) minmax(0, 1fr); } }
    .aside-left { position: relative; border-right: 1px solid var(--line); display: grid; grid-template-rows: auto auto 1fr; background: var(--panel-2); overflow: hidden; min-height: 0; }
    .aside-left::before { content: ''; position: absolute; inset: 0; background: radial-gradient(circle at 80% 10%, rgba(255,255,255,0.05), transparent 30%); pointer-events: none; }
    .topbar { padding: 12px; border-bottom: 1px solid var(--line); display: flex; align-items: center; gap: 10px; }
    .avatar { width: 36px; height: 36px; border-radius: 10px; background: linear-gradient(135deg, var(--accent), var(--accent-2)); display: grid; place-items: center; font-weight: 800; color: #fff; font-size: 14px; box-shadow: 0 10px 26px rgba(0,0,0,0.4); }
    .status-dot { width: 10px; height: 10px; border-radius: 50%; background: #34d07f; }
    .muted { color: var(--muted); font-size: 12px; }
    .list { overflow-y: auto; }
    .list-item { position: relative; display: grid; grid-template-columns: auto 1fr auto; gap: 10px; align-items: center; padding: 10px 12px; border-bottom: 1px solid var(--line); cursor: pointer; transition: background 0.14s ease, transform 0.18s ease; overflow: hidden; }
    .list-item::after { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, rgba(255,255,255,0.06), rgba(180,180,180,0.08)); opacity: 0; transition: opacity 0.18s ease; }
    .list-item:hover { transform: translateX(2px); }
    .list-item:hover::after { opacity: 1; }
    .list-item > * { position: relative; z-index: 1; }
    .list-item.active { background: rgba(255,255,255,0.1); box-shadow: inset 0 0 0 1px rgba(255,255,255,0.22); }
    .pill { padding: 4px 8px; border-radius: 999px; border: 1px solid var(--line); color: var(--muted); font-size: 11px; display: inline-flex; width: fit-content; }
    .search { padding: 10px 12px; border-bottom: 1px solid var(--line); display: grid; gap: 10px; background: linear-gradient(135deg, rgba(255,255,255,0.06), rgba(120,120,120,0.08)); }
    .input { width: 100%; padding: 9px 11px; border-radius: 9px; border: 1px solid var(--line); background: #0c1126; color: var(--text); font-size: 14px; }
    .input:focus { outline: 2px solid rgba(192, 198, 208, 0.82); outline-offset: 1px; }
    .chat { position: relative; display: grid; grid-template-rows: auto 1fr auto; height: 100%; background: #0f0f0f; min-height: 0; overflow: hidden; }
    .chat::before { content: ''; position: absolute; inset: 0; background: radial-gradient(circle at 70% 10%, rgba(255,255,255,0.04), transparent 30%), radial-gradient(circle at 20% 80%, rgba(140,140,140,0.06), transparent 30%); background-size: cover; mix-blend-mode: screen; pointer-events: none; }
    .chat-header { padding: 12px 14px; border-bottom: 1px solid var(--line); display: flex; align-items: center; gap: 10px; position: relative; z-index: 1; }
    .chat-header .name { font-weight: 700; }
    .chat-body { padding: 12px 14px; display: flex; flex-direction: column; gap: 10px; overflow-y: auto; min-height: 0; position: relative; z-index: 1; overscroll-behavior: contain; }
    .bubble { max-width: 72%; padding: 10px 12px; border-radius: 14px; font-size: 14px; line-height: 1.45; word-break: break-word; box-shadow: 0 10px 28px rgba(0,0,0,0.22); }
    .bubble.them { background: rgba(28,28,28,0.95); color: #efefef; border: 1px solid #343434; align-self: flex-start; }
    .bubble.me { background: linear-gradient(135deg, var(--accent), var(--accent-2)); color: #fff; align-self: flex-end; }
    .bubble.hint { background: #0f1329; color: var(--muted); border: 1px dashed var(--line); align-self: center; }
    .chat-input { border-top: 1px solid var(--line); padding: 10px 12px; display: grid; grid-template-columns: auto 1fr auto; gap: 8px; align-items: center; background: #0f0f0f; position: sticky; bottom: 0; z-index: 2; }
    .attach-btn { border: 1px solid var(--line); background: #0d1328; color: var(--text); border-radius: 9px; width: 38px; height: 38px; display: grid; place-items: center; cursor: pointer; font-size: 16px; }
    .send-btn { border: none; border-radius: 10px; background: linear-gradient(135deg, var(--accent), var(--accent-2)); color: #fff; width: 40px; height: 40px; font-size: 17px; cursor: pointer; box-shadow: 0 8px 20px rgba(0,0,0,0.35); }
    .aside-right { position: relative; border-left: 1px solid var(--line); background: var(--panel-2); padding: 14px; display: grid; gap: 12px; overflow: hidden; min-height: 0; }
    .aside-right::before { content: ''; position: absolute; inset: 0; background: radial-gradient(circle at 70% 10%, rgba(255,255,255,0.08), transparent 32%), radial-gradient(circle at 10% 90%, rgba(150,150,150,0.09), transparent 32%); pointer-events: none; }
    .tag { display: inline-flex; align-items: center; gap: 6px; background: #0f132a; border: 1px solid var(--line); padding: 6px 10px; border-radius: 999px; color: var(--muted); font-size: 12px; letter-spacing: 0.3px; text-transform: uppercase; }
    .login-overlay { position: fixed; inset: 0; background: rgba(5,6,11,0.85); display: grid; place-items: center; backdrop-filter: blur(8px); z-index: 20; }
    .card { background: var(--panel-2); border: 1px solid var(--line); border-radius: 14px; padding: 18px; width: min(340px, 90vw); box-shadow: var(--shadow); display: grid; gap: 10px; position: relative; overflow: hidden; }
    .card::after { content: ''; position: absolute; inset: 0; background: radial-gradient(circle at 20% 0%, rgba(255,255,255,0.08), transparent 38%); pointer-events: none; }
    .btn { padding: 9px 12px; border-radius: 9px; border: none; background: linear-gradient(135deg, var(--accent), var(--accent-2)); color: #fff; font-weight: 700; cursor: pointer; box-shadow: 0 8px 20px rgba(91,141,239,0.3); font-size: 14px; }
    .mini-btn { padding: 6px 9px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.08); background: rgba(255,255,255,0.05); color: #fff; font-weight: 700; cursor: pointer; font-size: 12px; }
    .empty { color: var(--muted); text-align: center; margin-top: 40px; font-size: 13px; }
    .media { max-width: 360px; border-radius: 10px; border: 1px solid var(--line); }
    .help-card { background: #0f152b; border: 1px solid var(--line); border-radius: 12px; padding: 10px; display: grid; gap: 6px; color: var(--muted); font-size: 12px; box-shadow: 0 14px 30px rgba(0,0,0,0.28); }
    .banner { position: relative; border-radius: 12px; padding: 12px; background-image: linear-gradient(135deg, rgba(70,70,70,0.42), rgba(30,30,30,0.58)); background-size: cover; background-position: center; overflow: hidden; box-shadow: 0 12px 30px rgba(0,0,0,0.35); }
    .banner::after { content: ''; position: absolute; inset: 0; background: linear-gradient(180deg, rgba(3,5,16,0) 0%, rgba(3,5,16,0.6) 100%); }
    .banner h3 { margin: 0; position: relative; z-index: 1; }
    .banner p { margin: 2px 0 0; position: relative; z-index: 1; color: #dedede; }
    .poster { position: relative; border-radius: 12px; overflow: hidden; height: 160px; background-image: linear-gradient(135deg, rgba(55,55,55,0.45), rgba(20,20,20,0.7)); background-size: cover; background-position: center; }
    .poster::after { content: 'Direct Messages'; position: absolute; left: 14px; bottom: 12px; font-weight: 800; letter-spacing: 1px; color: #f7fbff; text-transform: uppercase; text-shadow: 0 8px 20px rgba(0,0,0,0.45); }
    .chip { display: inline-flex; align-items: center; gap: 6px; padding: 5px 9px; border-radius: 999px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08); color: #dbe6ff; font-size: 12px; }
    .chip.glow { box-shadow: 0 0 0 1px rgba(255,255,255,0.25), 0 10px 20px rgba(0,0,0,0.35); }
    .section-label { margin: 4px 0; color: #d7d7d7; font-size: 11px; text-transform: uppercase; letter-spacing: 0.8px; }
    .group-create { display: grid; grid-template-columns: 1fr auto; gap: 8px; }
    .admin-panel { background: #121212; border: 1px solid var(--line); border-radius: 10px; padding: 10px; display: grid; gap: 8px; }
    .admin-row { display: grid; grid-template-columns: 1fr 1fr auto; gap: 6px; }
    .user-row { display: grid; grid-template-columns: 1fr auto; gap: 6px; align-items: center; padding: 6px; border: 1px solid #2b2b2b; border-radius: 8px; }
    .tiny-btn { padding: 4px 7px; border: 1px solid #3a3a3a; border-radius: 6px; background: #181818; color: #f0f0f0; cursor: pointer; font-size: 11px; }
    .tiny-btn.danger { border-color: #6c2f2f; color: #ffb6b6; }
    .member-row { display: grid; grid-template-columns: 1fr auto auto auto; gap: 6px; align-items: center; padding: 6px; border: 1px solid #2b2b2b; border-radius: 8px; }
    .hash { color: #9aa0ab; font-size: 11px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 220px; }
    .audit-row { padding: 6px; border: 1px solid #2b2b2b; border-radius: 8px; display: grid; gap: 2px; }
    .chip-list { display: flex; flex-wrap: wrap; gap: 6px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel">
    const { useEffect, useMemo, useState } = React;

    const isValidName = (name) => {
      const cleaned = (name || '').toString().trim().replace(/[^a-zA-Z0-9_-]/g, '');
      return cleaned.length > 0 ? cleaned : null;
    };

    const isValidGroup = (name) => {
      const cleaned = (name || '')
        .toString()
        .trim()
        .toLowerCase()
        .replace(/[^a-z0-9_-]/g, '-')
        .replace(/-+/g, '-')
        .replace(/^-|-$/g, '')
        .slice(0, 32);
      return cleaned || null;
    };

    const useSocket = () => {
      const [username, setUsername] = useState(null);
      const [isAdmin, setIsAdmin] = useState(false);
      const [connected, setConnected] = useState(false);
      const [users, setUsers] = useState([]);
      const [messages, setMessages] = useState({});
      const [groups, setGroups] = useState([]);
      const [discoverableGroups, setDiscoverableGroups] = useState([]);
      const [groupMessages, setGroupMessages] = useState({});
      const [groupMembers, setGroupMembers] = useState({});
      const [dmTyping, setDmTyping] = useState({});
      const [groupTyping, setGroupTyping] = useState({});
      const [adminUsers, setAdminUsers] = useState([]);
      const [auditLogs, setAuditLogs] = useState([]);
      const [authError, setAuthError] = useState('');
      const [appError, setAppError] = useState('');
      const appErrorTimerRef = React.useRef(null);
      const usernameRef = React.useRef(null);
      const typingTimersRef = React.useRef(new Map());
      const socket = useMemo(() => io(), []);

      useEffect(() => { usernameRef.current = username; }, [username]);

      useEffect(() => {
        setConnected(socket.connected);
        socket.on('connect', () => setConnected(true));
        socket.on('disconnect', () => setConnected(false));

        socket.on('auth:ok', data => {
          setUsername(data.username);
          setIsAdmin(!!data.isAdmin);
          setAuthError('');
          setAppError('');
          socket.emit('presence:list');
          socket.emit('group:list');
          if (data.isAdmin) {
            socket.emit('admin:users:list');
            socket.emit('admin:audit:list');
          }
        });

        socket.on('auth:error', payload => setAuthError(payload?.message || 'Login failed.'));
        socket.on('app:error', payload => {
          setAppError(payload?.message || 'Something went wrong.');
          if (appErrorTimerRef.current) clearTimeout(appErrorTimerRef.current);
          appErrorTimerRef.current = setTimeout(() => setAppError(''), 3500);
        });

        socket.on('presence:update', payload => setUsers(payload.users || []));
        socket.on('group:list', payload => {
          setGroups(payload.memberGroups || []);
          setDiscoverableGroups(payload.discoverableGroups || []);
        });

        socket.on('group:members', payload => {
          if (!payload?.group) return;
          setGroupMembers(prev => ({ ...prev, [payload.group]: payload }));
        });

        socket.on('admin:users', payload => {
          setAdminUsers(payload?.users || []);
        });

        socket.on('admin:audit', payload => {
          setAuditLogs(payload?.logs || []);
        });

        socket.on('group:message', msg => {
          setGroupMessages(prev => {
            const group = msg.group;
            const arr = prev[group] ? [...prev[group]] : [];
            return { ...prev, [group]: [...arr, msg] };
          });
        });

        socket.on('group:history', ({ group, messages: history }) => {
          setGroupMessages(prev => ({ ...prev, [group]: history || [] }));
        });

        socket.on('group:left', ({ group }) => {
          setGroupMessages(prev => {
            const copy = { ...prev };
            delete copy[group];
            return copy;
          });
        });

        socket.on('dm:message', msg => {
          setMessages(prev => {
            const current = usernameRef.current;
            const other = msg.from === current ? msg.to : msg.from;
            const arr = prev[other] ? [...prev[other]] : [];
            return { ...prev, [other]: [...arr, msg] };
          });
        });

        socket.on('dm:history', ({ withUser, messages: history }) => {
          setMessages(prev => ({ ...prev, [withUser]: history || [] }));
        });

        socket.on('dm:typing', ({ from, isTyping }) => {
          const key = `dm:${from}`;
          setDmTyping(prev => ({ ...prev, [from]: !!isTyping }));
          const existing = typingTimersRef.current.get(key);
          if (existing) clearTimeout(existing);
          if (isTyping) {
            const timer = setTimeout(() => {
              setDmTyping(prev => ({ ...prev, [from]: false }));
            }, 2200);
            typingTimersRef.current.set(key, timer);
          }
        });

        socket.on('group:typing', ({ group, from, isTyping }) => {
          if (!group || !from) return;
          const key = `group:${group}:${from}`;
          setGroupTyping(prev => {
            const groupSet = new Set(prev[group] || []);
            if (isTyping) groupSet.add(from);
            else groupSet.delete(from);
            return { ...prev, [group]: Array.from(groupSet) };
          });
          const existing = typingTimersRef.current.get(key);
          if (existing) clearTimeout(existing);
          if (isTyping) {
            const timer = setTimeout(() => {
              setGroupTyping(prev => {
                const groupSet = new Set(prev[group] || []);
                groupSet.delete(from);
                return { ...prev, [group]: Array.from(groupSet) };
              });
            }, 2200);
            typingTimersRef.current.set(key, timer);
          }
        });

        return () => {
          if (appErrorTimerRef.current) clearTimeout(appErrorTimerRef.current);
          for (const timer of typingTimersRef.current.values()) clearTimeout(timer);
          typingTimersRef.current.clear();
          socket.disconnect();
        };
      }, [socket]);

      const login = (name, password) => {
        const cleaned = isValidName(name);
        if (!cleaned) return;
        socket.emit('auth:login', { username: cleaned, password: String(password || '') });
      };

      const requestPresence = () => socket.emit('presence:list');
      const requestHistory = other => socket.emit('dm:history', { withUser: other });
      const sendDM = (to, payload) => socket.emit('dm:send', { to, ...payload });
      const sendDMTyping = (to, isTyping) => socket.emit('dm:typing', { to, isTyping });

      const requestGroups = () => socket.emit('group:list');
      const createGroup = name => socket.emit('group:create', { name });
      const joinGroup = group => socket.emit('group:join', { group });
      const leaveGroup = group => socket.emit('group:leave', { group });
      const requestGroupHistory = group => socket.emit('group:history', { group });
      const requestGroupMembers = group => socket.emit('group:members:list', { group });
      const setGroupRole = (group, targetUser, role) => socket.emit('group:member:role', { group, targetUser, role });
      const removeGroupMember = (group, targetUser) => socket.emit('group:member:remove', { group, targetUser });
      const sendGroup = (group, payload) => socket.emit('group:send', { group, ...payload });
      const sendGroupTyping = (group, isTyping) => socket.emit('group:typing', { group, isTyping });

      const requestAdminUsers = () => socket.emit('admin:users:list');
      const requestAdminAudit = () => socket.emit('admin:audit:list');
      const addUser = (username, password) => socket.emit('admin:user:add', { username, password });
      const removeUser = username => socket.emit('admin:user:remove', { username });

      return {
        username,
        isAdmin,
        connected,
        users,
        messages,
        groups,
        discoverableGroups,
        groupMessages,
        groupMembers,
        dmTyping,
        groupTyping,
        adminUsers,
        auditLogs,
        authError,
        appError,
        login,
        requestPresence,
        requestHistory,
        sendDM,
        sendDMTyping,
        requestGroups,
        createGroup,
        joinGroup,
        leaveGroup,
        requestGroupHistory,
        requestGroupMembers,
        setGroupRole,
        removeGroupMember,
        sendGroup,
        sendGroupTyping,
        requestAdminUsers,
        requestAdminAudit,
        addUser,
        removeUser
      };
    };

    const Login = ({ onLogin, authError }) => {
      const [name, setName] = useState('');
      const [password, setPassword] = useState('');
      const [error, setError] = useState('');

      const submit = () => {
        const cleaned = isValidName(name);
        if (!cleaned) return setError('Use letters, numbers, _ or - in username.');
        if (password.length < 4) return setError('Password must be at least 4 characters.');
        setError('');
        onLogin(cleaned, password);
      };

      return (
        <div className="login-overlay">
          <div className="card">
            <h2 style={{margin:0}}>Sign in</h2>
            <p className="muted" style={{margin:0}}>Use username/password. Admin login: admin / admin123.</p>
            <input className="input" placeholder="Username" value={name} onChange={e => setName(e.target.value)} />
            <input className="input" type="password" placeholder="Password" value={password} onChange={e => setPassword(e.target.value)} onKeyDown={e => { if (e.key === 'Enter') submit(); }} />
            {(error || authError) && <div className="muted" style={{color:'#ff9b9b'}}>{error || authError}</div>}
            <button className="btn" onClick={submit}>Enter Chat</button>
          </div>
        </div>
      );
    };

    const SidebarList = ({ users, groups, me, activeChat, onSelectUser, onSelectGroup, messages, groupMessages, searchTerm }) => {
      const q = (searchTerm || '').trim().toLowerCase();
      const filteredUsers = users.filter(u => u !== me && (!q || u.toLowerCase().includes(q)));
      const filteredGroups = groups.filter(g => !q || g.toLowerCase().includes(q));

      const previewText = (last) => {
        if (!last) return 'No messages yet';
        if (last.kind === 'image') return '[Image]';
        if (last.kind === 'video') return '[Video]';
        if (last.kind === 'audio') return '[Audio]';
        return (last.text || '').toString().slice(0, 56);
      };

      return (
        <div className="list">
          <div className="section-label">Group Chats</div>
          {filteredGroups.length === 0 && <div className="empty" style={{marginTop:'8px'}}>No joined groups.</div>}
          {filteredGroups.map(g => {
            const thread = groupMessages[g] || [];
            return (
              <div key={g} className={`list-item ${activeChat?.type === 'group' && activeChat?.id === g ? 'active' : ''}`} onClick={() => onSelectGroup(g)}>
                <div className="avatar">#</div>
                <div>
                  <div style={{fontWeight:700}}>{g}</div>
                  <div className="muted" style={{fontSize:'12px', whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis', maxWidth:'160px'}}>{previewText(thread[thread.length - 1])}</div>
                </div>
              </div>
            );
          })}

          <div className="section-label" style={{marginTop:'12px'}}>Direct Messages</div>
          {filteredUsers.length === 0 && <div className="empty" style={{marginTop:'8px'}}>No other users online.</div>}
          {filteredUsers.map(u => {
            const thread = messages[u] || [];
            return (
              <div key={u} className={`list-item ${activeChat?.type === 'dm' && activeChat?.id === u ? 'active' : ''}`} onClick={() => onSelectUser(u)}>
                <div className="avatar">{u.slice(0,2).toUpperCase()}</div>
                <div>
                  <div style={{fontWeight:700}}>{u}</div>
                  <div className="muted" style={{fontSize:'12px', whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis', maxWidth:'160px'}}>{previewText(thread[thread.length - 1])}</div>
                </div>
                <div className="status-dot"></div>
              </div>
            );
          })}
        </div>
      );
    };

    const ChatWindow = ({ me, activeChat, messages, groupMessages, typingStatus, connected, onSendDM, onSendGroup, onTypingDM, onTypingGroup }) => {
      const [text, setText] = useState('');
      const [recording, setRecording] = useState(false);
      const mediaRecorderRef = React.useRef(null);
      const chunksRef = React.useRef([]);
      const fileInputRef = React.useRef(null);
      const messagesRef = React.useRef(null);
      const prevThreadLenRef = React.useRef(0);
      const typingStopTimerRef = React.useRef(null);

      const mode = activeChat?.type;
      const target = activeChat?.id;
      const isGroup = mode === 'group';
      const thread = !target ? [] : (isGroup ? (groupMessages[target] || []) : (messages[target] || []));

      useEffect(() => {
        setText('');
        prevThreadLenRef.current = thread.length;
        if (messagesRef.current) messagesRef.current.scrollTop = messagesRef.current.scrollHeight;
      }, [mode, target]);

      useEffect(() => {
        const scroller = messagesRef.current;
        if (!scroller) return;
        const prevLen = prevThreadLenRef.current;
        const nextLen = thread.length;
        const nearBottom = scroller.scrollHeight - scroller.scrollTop - scroller.clientHeight < 80;
        if (nextLen > prevLen && nearBottom) scroller.scrollTop = scroller.scrollHeight;
        prevThreadLenRef.current = nextLen;
      }, [thread.length]);

      useEffect(() => {
        return () => {
          if (typingStopTimerRef.current) clearTimeout(typingStopTimerRef.current);
        };
      }, []);

      const emitSend = (payload) => {
        if (!target) return;
        if (isGroup) onSendGroup(target, payload);
        else onSendDM(target, payload);
      };

      const submit = () => {
        const value = text.trim();
        if (!value) return;
        if (!connected) return;
        emitSend({ kind: 'text', text: value });
        if (isGroup) onTypingGroup(target, false);
        else onTypingDM(target, false);
        setText('');
      };

      const handleTextChange = (value) => {
        setText(value);
        if (!target) return;
        if (isGroup) onTypingGroup(target, value.trim().length > 0);
        else onTypingDM(target, value.trim().length > 0);
        if (typingStopTimerRef.current) clearTimeout(typingStopTimerRef.current);
        typingStopTimerRef.current = setTimeout(() => {
          if (isGroup) onTypingGroup(target, false);
          else onTypingDM(target, false);
        }, 1500);
      };

      const handleFile = async (file) => {
        if (!file) return;
        const kind = file.type.startsWith('image/') ? 'image' : file.type.startsWith('video/') ? 'video' : 'audio';
        const reader = new FileReader();
        reader.onload = () => emitSend({ kind, text: '', mediaType: file.type, mediaData: reader.result });
        reader.readAsDataURL(file);
      };

      const startRecording = async () => {
        if (!navigator.mediaDevices?.getUserMedia) return;
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        const mr = new MediaRecorder(stream);
        chunksRef.current = [];
        mediaRecorderRef.current = mr;
        mr.ondataavailable = e => { if (e.data.size > 0) chunksRef.current.push(e.data); };
        mr.onstop = () => {
          const blob = new Blob(chunksRef.current, { type: 'audio/webm' });
          const reader = new FileReader();
          reader.onloadend = () => emitSend({ kind: 'audio', text: '', mediaType: 'audio/webm', mediaData: reader.result });
          reader.readAsDataURL(blob);
          stream.getTracks().forEach(t => t.stop());
        };
        mr.start();
        setRecording(true);
      };

      const stopRecording = () => {
        const mr = mediaRecorderRef.current;
        if (mr && mr.state !== 'inactive') mr.stop();
        setRecording(false);
      };

      if (!target) return <div className="chat"><div className="chat-body"><div className="bubble hint">Select a direct message or joined group from the left.</div></div></div>;

      return (
        <div className="chat">
          <div className="chat-header">
            <div className="avatar">{isGroup ? '#' : target.slice(0,2).toUpperCase()}</div>
            <div>
              <div className="name">{target}</div>
              <div className="muted" style={{fontSize:'12px'}}>{typingStatus || (isGroup ? 'Group chat' : 'Direct message')}</div>
            </div>
            <div style={{marginLeft:'auto'}} className="chip glow" title={isGroup ? 'Group chat' : 'Private chat'}>
              {isGroup ? 'Shadow Relay' : 'Stealth Tunnel'}
            </div>
          </div>
          <div className="chat-body" ref={messagesRef}>
            {thread.length === 0 && <div className="bubble hint">{isGroup ? `Start the group conversation in #${target}.` : `Say hello to ${target}.`}</div>}
            {thread.map(msg => {
              const mine = msg.from === me;
              const key = msg.id || `${msg.createdAt}-${msg.from}`;
              if (msg.kind === 'image') return <div key={key} className={`bubble ${mine ? 'me' : 'them'}`}><img className="media" src={msg.mediaData} alt="image" /></div>;
              if (msg.kind === 'video') return <div key={key} className={`bubble ${mine ? 'me' : 'them'}`}><video className="media" src={msg.mediaData} controls></video></div>;
              if (msg.kind === 'audio') return <div key={key} className={`bubble ${mine ? 'me' : 'them'}`}><audio controls src={msg.mediaData}></audio></div>;
              return <div key={key} className={`bubble ${mine ? 'me' : 'them'}`}>{isGroup && !mine ? `${msg.from}: ${msg.text}` : msg.text}<div className="muted" style={{fontSize:'11px', marginTop:'5px', color: mine ? 'rgba(255,255,255,0.85)' : undefined}}>{new Date(msg.createdAt || Date.now()).toLocaleTimeString()}</div></div>;
            })}
          </div>
          <div className="chat-input">
            <button className="attach-btn" title="Attach file" onClick={() => fileInputRef.current?.click()}>📎</button>
            <input className="input" placeholder={connected ? (isGroup ? `Message #${target}` : `Message ${target}`) : 'Disconnected. Reconnecting...'} disabled={!connected} value={text} onChange={e => handleTextChange(e.target.value)} onKeyDown={e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); submit(); } }} />
            <button className="send-btn" onClick={submit} disabled={!connected} style={{opacity: connected ? 1 : 0.45}}>→</button>
            <input ref={fileInputRef} type="file" accept="image/*,video/*,audio/*" style={{display:'none'}} onChange={e => { const f = e.target.files?.[0]; if (f) handleFile(f); e.target.value=''; }} />
            <button className="attach-btn" title="Voice note" onClick={recording ? stopRecording : startRecording}>{recording ? '■' : '🎤'}</button>
          </div>
        </div>
      );
    };

    const AsideRight = ({ activeChat, memberInfo, isAdmin, adminUsers, auditLogs, onRoleChange, onRemoveMember, onRefreshMembers, onLeaveGroup, onAddUser, onRemoveUser, onRefreshUsers, onRefreshAudit }) => {
      const [newUser, setNewUser] = useState('');
      const [newPass, setNewPass] = useState('');

      const canManageGroup = memberInfo && (memberInfo.myRole === 'owner' || memberInfo.myRole === 'admin' || isAdmin);

      return (
        <div className="aside-right">
          <div className="poster"></div>
          <h3 style={{margin:'0 0 6px'}}>Chat Info</h3>
          {activeChat ? (
            <>
              <div className="tag">{activeChat.type === 'group' ? 'Group' : 'User'}</div>
              <div style={{fontWeight:700}}>{activeChat.id}</div>
              <div className="muted">{activeChat.type === 'group' ? 'Private member-only room' : '1:1 conversation'}</div>
            </>
          ) : (
            <div className="muted">Select a conversation to see details.</div>
          )}

          {activeChat?.type === 'group' && (
            <div className="admin-panel">
              <div style={{display:'flex', justifyContent:'space-between', alignItems:'center'}}>
                <strong>Group Members</strong>
                <div style={{display:'flex', gap:'6px'}}>
                  {memberInfo?.myRole !== 'owner' && <button className="tiny-btn danger" onClick={onLeaveGroup}>Leave</button>}
                  <button className="tiny-btn" onClick={onRefreshMembers}>Refresh</button>
                </div>
              </div>
              {(memberInfo?.members || []).map(m => (
                <div className="member-row" key={m.username}>
                  <div>{m.username} <span className="muted">({m.role})</span></div>
                  {canManageGroup && m.role !== 'owner' && <button className="tiny-btn" onClick={() => onRoleChange(m.username, m.role === 'admin' ? 'member' : 'admin')}>{m.role === 'admin' ? 'Demote' : 'Promote'}</button>}
                  {canManageGroup && m.role !== 'owner' && <button className="tiny-btn danger" onClick={() => onRemoveMember(m.username)}>Remove</button>}
                  {!canManageGroup && <span className="muted">Read only</span>}
                </div>
              ))}
            </div>
          )}

          {isAdmin && (
            <div className="admin-panel">
              <div style={{display:'flex', justifyContent:'space-between', alignItems:'center'}}>
                <strong>Admin: Users</strong>
                <button className="tiny-btn" onClick={onRefreshUsers}>Refresh</button>
              </div>
              <div className="admin-row">
                <input className="input" placeholder="username" value={newUser} onChange={e => setNewUser(e.target.value)} />
                <input className="input" placeholder="password" value={newPass} onChange={e => setNewPass(e.target.value)} />
                <button className="tiny-btn" onClick={() => { onAddUser(newUser, newPass); setNewUser(''); setNewPass(''); }}>Add/Update</button>
              </div>
              {adminUsers.map(u => (
                <div className="user-row" key={u.username}>
                  <div>
                    <div style={{fontWeight:700}}>{u.username}</div>
                    <div className="hash">Created: {u.createdAt ? new Date(u.createdAt).toLocaleString() : 'unknown'}</div>
                  </div>
                  {u.username !== 'admin' && <button className="tiny-btn danger" onClick={() => onRemoveUser(u.username)}>Remove</button>}
                </div>
              ))}
            </div>
          )}

          {isAdmin && (
            <div className="admin-panel">
              <div style={{display:'flex', justifyContent:'space-between', alignItems:'center'}}>
                <strong>Admin: Audit Log</strong>
                <button className="tiny-btn" onClick={onRefreshAudit}>Refresh</button>
              </div>
              {auditLogs.length === 0 && <div className="muted">No audit entries yet.</div>}
              {auditLogs.slice(0, 25).map(log => (
                <div className="audit-row" key={log.id || `${log.action}-${log.createdAt}`}>
                  <div style={{fontWeight:700}}>{log.action}</div>
                  <div className="muted">Actor: {log.actor} | Target: {log.target || '-'}</div>
                  <div className="muted">{log.detail || '-'}</div>
                  <div className="muted">{new Date(log.createdAt).toLocaleString()}</div>
                </div>
              ))}
            </div>
          )}

          <div className="help-card">
            <div style={{fontWeight:700, color:'#f4f6ff'}}>Ninja Tips</div>
            <div title="Start the server">• Boot the dojo: chatapp/server → node index.js</div>
            <div title="Private room">• Shadow Relay = group room</div>
            <div title="Private message">• Stealth Tunnel = direct message</div>
            <div title="Connected">• Holo Link = connected to server</div>
          </div>
        </div>
      );
    };

    const App = () => {
      const {
        username,
        isAdmin,
        connected,
        users,
        messages,
        groups,
        discoverableGroups,
        groupMessages,
        groupMembers,
        dmTyping,
        groupTyping,
        adminUsers,
        auditLogs,
        authError,
        appError,
        login,
        requestPresence,
        requestHistory,
        sendDM,
        sendDMTyping,
        requestGroups,
        createGroup,
        joinGroup,
        leaveGroup,
        requestGroupHistory,
        requestGroupMembers,
        setGroupRole,
        removeGroupMember,
        sendGroup,
        sendGroupTyping,
        requestAdminUsers,
        requestAdminAudit,
        addUser,
        removeUser
      } = useSocket();

      const [activeChat, setActiveChat] = useState(null);
      const [newGroupName, setNewGroupName] = useState('');
      const [searchTerm, setSearchTerm] = useState('');

      useEffect(() => {
        if (!username) return;
        requestPresence();
        requestGroups();
        if (isAdmin) {
          requestAdminUsers();
          requestAdminAudit();
        }
      }, [username, isAdmin, requestPresence, requestGroups, requestAdminUsers, requestAdminAudit]);

      useEffect(() => {
        if (!username) return;
        const id = setInterval(() => requestPresence(), 5000);
        return () => clearInterval(id);
      }, [username, requestPresence]);

      useEffect(() => {
        if (activeChat) return;
        const firstOther = users.find(u => u !== username);
        if (firstOther) {
          setActiveChat({ type: 'dm', id: firstOther });
          requestHistory(firstOther);
        }
      }, [users, username, activeChat, requestHistory]);

      const selectUser = (u) => {
        setActiveChat({ type: 'dm', id: u });
        requestHistory(u);
      };

      const selectGroup = (g) => {
        setActiveChat({ type: 'group', id: g });
        requestGroupHistory(g);
        requestGroupMembers(g);
      };

      const addOrJoinGroup = () => {
        const normalized = isValidGroup(newGroupName);
        if (!normalized) return;
        if (groups.includes(normalized)) {
          selectGroup(normalized);
        } else if (discoverableGroups.includes(normalized)) {
          joinGroup(normalized);
          setTimeout(() => selectGroup(normalized), 120);
        } else {
          createGroup(normalized);
          setTimeout(() => selectGroup(normalized), 120);
        }
        setNewGroupName('');
      };

      const quickJoinGroup = (group) => {
        joinGroup(group);
        setTimeout(() => selectGroup(group), 120);
      };

      const leaveCurrentGroup = () => {
        if (activeChat?.type !== 'group') return;
        const group = activeChat.id;
        leaveGroup(group);
        setActiveChat(null);
      };

      const memberInfo = activeChat?.type === 'group' ? groupMembers[activeChat.id] : null;
      const typingStatus = activeChat?.type === 'group'
        ? ((groupTyping[activeChat.id] || []).length > 0 ? `${(groupTyping[activeChat.id] || []).slice(0, 2).join(', ')} typing...` : '')
        : (activeChat?.type === 'dm' && dmTyping[activeChat.id] ? `${activeChat.id} is typing...` : '');

      return (
        <>
          {!username && <Login onLogin={login} authError={authError} />}
          <div className="app-shell">
            <div className="aside-left">
              <div className="topbar">
                <div className="avatar">{(username || '??').slice(0,2).toUpperCase()}</div>
                <div>
                  <div style={{fontWeight:700}}>{username || 'Not signed in'}</div>
                  <div className="muted" style={{fontSize:'12px'}} title="Direct messages and groups">Ninja Relay</div>
                </div>
                <div style={{marginLeft:'auto'}} className="chip glow" title={connected ? 'Connected to server' : 'Reconnecting to server'}>{connected ? 'Stealth ON' : 'Link Offline'}</div>
              </div>
              <div className="search">
                <div className="banner">
                  <h3 title="Conversations list">Shadow Relay</h3>
                  <p title="Live direct and group chat">Encrypted drops with black-ops clarity.</p>
                  <div style={{display:'flex', gap:'8px', alignItems:'center', marginTop:'6px'}}>
                    <span className="chip" title="Connected to server">Holo Link</span>
                    <span className="chip glow" title="Low latency">Latency Safe</span>
                    <button className="mini-btn" onClick={() => { requestPresence(); requestGroups(); if (isAdmin) { requestAdminUsers(); requestAdminAudit(); } }} title="Refresh users and groups">Ping squad</button>
                  </div>
                </div>
                <div className="pill">Online • {Math.max(users.length - 1, 0)}</div>
                {appError && <div className="muted" style={{color:'#ffb0b0'}}>{appError}</div>}
                <input className="input" placeholder="Search users/groups" value={searchTerm} onChange={e => setSearchTerm(e.target.value)} />
                <div className="group-create">
                  <input className="input" placeholder="Create or join group name" value={newGroupName} onChange={e => setNewGroupName(e.target.value)} />
                  <button className="mini-btn" onClick={addOrJoinGroup}>Go</button>
                </div>
                {discoverableGroups.length > 0 && (
                  <div className="chip-list">
                    {discoverableGroups.slice(0, 8).map(g => (
                      <button key={g} className="tiny-btn" onClick={() => quickJoinGroup(g)} title="Join group">+ {g}</button>
                    ))}
                  </div>
                )}
              </div>
              <SidebarList users={users} groups={groups} me={username} activeChat={activeChat} onSelectUser={selectUser} onSelectGroup={selectGroup} messages={messages} groupMessages={groupMessages} searchTerm={searchTerm} />
            </div>
            <ChatWindow
              me={username}
              activeChat={activeChat}
              messages={messages}
              groupMessages={groupMessages}
              typingStatus={typingStatus}
              connected={connected}
              onSendDM={sendDM}
              onSendGroup={sendGroup}
              onTypingDM={sendDMTyping}
              onTypingGroup={sendGroupTyping}
            />
            <AsideRight
              activeChat={activeChat}
              memberInfo={memberInfo}
              isAdmin={isAdmin}
              adminUsers={adminUsers}
              auditLogs={auditLogs}
              onRoleChange={(targetUser, role) => activeChat?.type === 'group' && setGroupRole(activeChat.id, targetUser, role)}
              onRemoveMember={(targetUser) => activeChat?.type === 'group' && removeGroupMember(activeChat.id, targetUser)}
              onRefreshMembers={() => activeChat?.type === 'group' && requestGroupMembers(activeChat.id)}
              onLeaveGroup={leaveCurrentGroup}
              onAddUser={addUser}
              onRemoveUser={removeUser}
              onRefreshUsers={requestAdminUsers}
              onRefreshAudit={requestAdminAudit}
            />
          </div>
        </>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
